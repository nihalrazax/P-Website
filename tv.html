<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TV</title>
<style>
/* ===== iframe embed overrides ===== */
html, body {
  background: transparent !important;
  overflow: hidden;
}

/* ===== Original TV CSS (adapted) ===== */
:root {
  --body: #2d313b;
  --body-hsl: 30, 7%, 12%;
  --none: hsla(0 0% 100% / 0);
  --wht: #f2fdff;
  --wht-hsl: 30, 20%, 95%;
  --cube: 30rem;
  --dark: hsla(var(--body-hsl), 0.5);
  --grey: #7fe160;
  --time: 10s;
  --stime: 0.5s;
  --pixel-hsl: 0, 100, 18;
  --pixel: #0e1e2c;
  --metal: #847e75;
  --r: hsla(180, 100%, 50%, 0.2);
  --g: hsla(300, 100%, 50%, 0.2);
}

*, *:before, *:after { box-sizing: border-box; }

html, body { min-height: 100%; margin: 0; font-family: sans-serif; }

input { visibility: hidden; }

html { font-size: 1svh; }

@media (max-width: 1100px) {
  html { font-size: 0.55svw; }
}

@media (orientation: portrait) {
  html { font-size: 0.76svw; }
}

content *, *:before, *:after, content:before, content:after {
  position: absolute;
}

crt div, screen > u, light, effects, test {
  width: 100%;
  height: 100%;
}

content {
  box-shadow: 0 0 0 2rem var(--body), 0 0 5rem 2rem #000;
  width: inherit;
  border-radius: 4rem;
  background: radial-gradient(circle at 100% 0, #d8d19d, #77533d, var(--body))
    hsla(var(--wht-hsl), 0.9);
  display: block;
}
@media (orientation: landscape) {
  content {
    aspect-ratio: 1.8/1;
    max-height: 100svh;
    display: flex;
    margin: auto;
  }
}

body {
  margin: auto;
  background: transparent;
}

label { inset: 0; margin: auto; cursor: pointer; }

.squircle {
  border-radius: calc(100% - 19rem) / 43rem;
  inset: -50%;
  margin: auto;
  corner-shape: squircle;
  overflow: hidden;
}

content set,
content crt,
content panel,
content knobs,
content grill,
content knobs div,
content .badge,
content span,
content flex {
  position: relative;
}

.d-flex { display: flex; }
.d-block { display: block; }
flex { flex: 1 1 auto; }
.text-center { text-align: center; }
.my-md { margin-block: 1rem; }
.mx-auto { margin-inline: auto; }

.text-white {
  color: var(--wht);
  text-transform: uppercase;
  text-shadow: -0.1rem 0.1rem 0 var(--body), 0.05rem -0.05rem 0 #fff;
}

set {
  display: flex;
  padding: 2rem;
  gap: 4rem;
  margin: auto;
  width: 100%;
  filter: drop-shadow(0.2rem 0 0 #00ff0033) drop-shadow(-0.2rem 0 0 #ff00ff33);
}
set panel { flex: 1 1 auto; }

@media (orientation: portrait) {
  set { flex-direction: column; }
}

set:after {
  width: 100%;
  height: 100%;
  background: radial-gradient(at 40% 40%, transparent, transparent, #a64c2f),
    linear-gradient(transparent, #780d7c);
  content: "";
  z-index: 10;
  inset: 0;
  mix-blend-mode: color;
  opacity: 0.3;
  filter: blur(2rem);
  border-radius: 4rem;
  pointer-events: none;
}

panel {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  border-radius: 3rem;
  padding: 1rem;
  margin: -1rem;
  background: var(--body);
  box-shadow: -0.1rem 0.1rem 0.1rem #00000033, inset 0 0 0.5rem #423d3a,
    -0.5rem 0.5rem 0.5rem #36323a;
}
@media (orientation: portrait) {
  panel { flex-direction: row; }
}

grill, knobs {
  display: flex;
  flex: 1 1 auto;
  justify-content: center;
  height: 100%;
  flex-direction: column;
  gap: 1rem;
  background: #3a353e;
  padding: 1rem;
  border-radius: 2rem;
  border: solid 1rem #44424e;
  box-shadow: inset -0.5rem 0.5rem 0.5rem var(--dark),
    -0.5rem 0.5rem 0.5rem #36323a;
}

grill:after, knobs:after {
  width: 100%;
  height: 100%;
  background: radial-gradient(at 60% 40%, var(--wht), transparent);
  content: "";
  transform: translate3d(-1rem, 0, 0);
  border-radius: 1rem;
  z-index: 2;
  opacity: 0.1;
}

grill speaker, knobs speaker {
  max-width: 80%;
  max-height: 80%;
  background: conic-gradient(from 180deg, var(--body), #1e2128, var(--body));
  margin: auto;
  border-radius: 50%;
  inset: 0;
  box-shadow: -0.5rem 0.5rem 0.5rem hsla(var(--wht-hsl), 0.1),
    0.5rem -0.5rem 0.5rem hsla(var(--body-hsl), 0.5);
}

grill > u, knobs > u {
  display: block;
  height: 1rem;
  background: #44424e;
  border-radius: 0.5rem;
  box-shadow: -0.5rem 0.5rem 0.5rem var(--dark),
    inset -0.2rem 0.2rem 0.2rem hsla(var(--wht-hsl), 0.1);
  position: relative;
  z-index: 1;
}
@media (orientation: portrait) {
  grill > u, knobs > u { height: 0.98rem; }
}

knobs div {
  border-radius: 0.5rem;
  background: repeating-linear-gradient(90deg,
      transparent, transparent 0.5rem,
      hsla(var(--body-hsl), 0.01) 0.5rem,
      hsla(var(--wht-hsl), 0.025) 1rem),
    radial-gradient(at 30% 70%, hsla(var(--body-hsl), 0.5), transparent),
    #454149;
  box-shadow: -0.5rem 0.5rem 0.5rem var(--dark),
    inset -0.2rem 0.2rem 0.2rem hsla(var(--wht-hsl), 0.1),
    inset 0 0 0 1rem #44424e,
    inset -1.25rem 1.25rem 0.5rem var(--dark),
    inset -1.25rem 1.25rem 0.5rem var(--dark);
  padding: 2rem;
}

knobs div:nth-of-type(1),
knobs div:nth-of-type(2) { flex: 1 1 auto; }

[for="on-off"], .power u, .tuning u {
  position: relative;
  display: block;
}
[for="on-off"], [for="on-off"]:before, [for="on-off"]:after,
.power u, .power u:before, .power u:after,
.tuning u, .tuning u:before, .tuning u:after {
  aspect-ratio: 1/1;
  border-radius: 50%;
}

[for="on-off"] {
  width: 6em;
  background: var(--body);
  box-shadow: -0.2em 0.2em 0.2em hsla(var(--wht-hsl), 0.1),
    0.2em -0.2em 0.2em hsla(var(--body-hsl), 0.5);
  cursor: pointer;
  z-index: 5;
}
[for="on-off"]:after, [for="on-off"]:before {
  content: "";
  width: 4em;
  inset: 0;
  margin: auto;
}
[for="on-off"]:after {
  background: radial-gradient(transparent, #ff0199, transparent);
  mix-blend-mode: lighten;
  opacity: 0;
}
[for="on-off"]:before {
  background: #792e5b;
  box-shadow: -1em 1em 1em hsla(var(--body-hsl), 0.5),
    inset -1em 1em 1em hsla(var(--body-hsl), 0.5),
    inset -0.25em 0.25em 0.1em hsla(var(--wht-hsl), 0.5),
    inset 0.25em -0.25em 0.1em hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.5em var(--metal),
    inset 0 0 0 0.6em var(--body),
    inset -0.6em 0.6em 0 hsla(var(--wht-hsl), 0.5),
    inset 0.6em -0.6em 0 hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.8em hsla(var(--body-hsl), 0.2);
  transition: all 0.2s ease-in-out;
  animation: on-button 2s ease-out forwards;
}
[for="on-off"]:hover:before, [for="on-off"]:focus:before {
  background: #792e5b;
  filter: brightness(1.2) contrast(1.2);
  box-shadow: -0.5em 0.5em 0.5em hsla(var(--body-hsl), 0.5),
    inset -1em 1em 1em hsla(var(--body-hsl), 0.5),
    inset -0.25em 0.25em 0.1em hsla(var(--wht-hsl), 0.5),
    inset 0.25em -0.25em 0.1em hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.5em var(--metal),
    inset 0 0 0 0.6em var(--body),
    inset -0.6em 0.6em 0 hsla(var(--wht-hsl), 0.5),
    inset 0.6em -0.6em 0 hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.8em hsla(var(--body-hsl), 0.2);
}

body:has(#on-off:checked) [for="on-off"] { display: block; }
body:has(#on-off:checked) [for="on-off"]:before {
  background: #792e5b;
  filter: brightness(1.5) contrast(1.2);
  box-shadow: inset 0 0 0.2em 0.1em var(--body),
    inset -1em 1em 1em hsla(var(--body-hsl), 0.5),
    inset -0.25em 0.25em 0.1em hsla(var(--wht-hsl), 0.5),
    inset 0.25em -0.25em 0.1em hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.5em var(--metal),
    inset 0 0 0 0.6em var(--body),
    inset -0.6em 0.6em 0 hsla(var(--wht-hsl), 0.5),
    inset 0.6em -0.6em 0 hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.8em hsla(var(--body-hsl), 0.2);
}
body:has(#on-off:checked) [for="on-off"]:after { opacity: 0.5; }

@keyframes on-button {
  0%, 50% {
    background: #792e5b;
    filter: brightness(1.5) contrast(1.2);
    box-shadow: inset 0 0 0.2em 0.1em var(--body),
      inset -1em 1em 1em hsla(var(--body-hsl), 0.5),
      inset -0.25em 0.25em 0.1em hsla(var(--wht-hsl), 0.5),
      inset 0.25em -0.25em 0.1em hsla(var(--body-hsl), 0.5),
      inset 0 0 0 0.5em var(--metal),
      inset 0 0 0 0.6em var(--body),
      inset -0.6em 0.6em 0 hsla(var(--wht-hsl), 0.5),
      inset 0.6em -0.6em 0 hsla(var(--body-hsl), 0.5),
      inset 0 0 0 0.8em hsla(var(--body-hsl), 0.2);
  }
}

.power > u, .vol > u, .tuning > u {
  width: 6em;
  background: var(--body);
  box-shadow: -0.2em 0.2em 0.2em hsla(var(--wht-hsl), 0.1),
    0.2em -0.2em 0.2em hsla(var(--body-hsl), 0.5);
  z-index: 5;
  inset: 0;
  margin: auto;
}

.power > u > u:before, .vol > u > u:before, .tuning > u > u:before,
.power > u > u > u:before, .vol > u > u > u:before, .tuning > u > u > u:before {
  content: "";
  width: 5em;
  inset: 0;
  margin: auto;
}

.power > u > u > u:before, .vol > u > u > u:before, .tuning > u > u > u:before {
  border: dashed 0.1em var(--body);
}

.power > u > u:before, .vol > u > u:before, .tuning > u > u:before {
  background: linear-gradient(45deg, #908e95, #575356, #a3a3a8);
  box-shadow: -1em 1em 1em hsla(var(--body-hsl), 0.5),
    inset -1em 1em 1em hsla(var(--body-hsl), 0.5),
    inset -0.25em 0.25em 0.1em hsla(var(--wht-hsl), 0.5),
    inset 0.25em -0.25em 0.1em hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.5em var(--metal),
    inset 0 0 0 0.6em var(--body),
    inset -0.6em 0.6em 0 hsla(var(--wht-hsl), 0.5),
    inset 0.6em -0.6em 0 hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.8em hsla(var(--body-hsl), 0.2);
}

.power > u > u:after, .vol > u > u:after, .tuning > u > u:after {
  background: var(--wht);
  height: 0.5em;
  border-radius: 0.25em;
  box-shadow: inset -0.15em 0.15em 0.15em hsla(var(--body-hsl), 0.5);
  content: "";
  width: 0.5em;
  inset: 0;
  margin: auto;
  transform: translate3d(0, -1em, 0);
}

.tuning > u {
  width: 10em;
  margin: auto;
}
.tuning > u > u {
  width: 10em;
  position: absolute;
}
.tuning > u > u:before,
.tuning > u > u > u:before {
  content: "";
  width: 9em;
  inset: 0;
  margin: auto;
}
.tuning > u > u > u:before {
  border: dashed 0.1em var(--body);
}
.tuning > u > u:before {
  background: linear-gradient(45deg, #908e95, #575356, #a3a3a8);
  box-shadow: -1em 1em 1em hsla(var(--body-hsl), 0.5),
    inset -1em 1em 1em hsla(var(--body-hsl), 0.5),
    inset -0.25em 0.25em 0.1em hsla(var(--wht-hsl), 0.5),
    inset 0.25em -0.25em 0.1em hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.5em var(--metal),
    inset 0 0 0 0.6em var(--body),
    inset -0.6em 0.6em 0 hsla(var(--wht-hsl), 0.5),
    inset 0.6em -0.6em 0 hsla(var(--body-hsl), 0.5),
    inset 0 0 0 0.8em hsla(var(--body-hsl), 0.2);
}
.tuning > u > u:after {
  background: var(--wht);
  height: 2em;
  border-radius: 0.25em;
  box-shadow: inset -0.25em 0.25em 0.25em hsla(var(--body-hsl), 0.5);
  content: "";
  width: 0.5em;
  inset: 0;
  margin: auto;
  transform: translate3d(0, -2em, 0);
}

dial, dialvol {
  width: 10em;
  aspect-ratio: 1/1;
  display: flex;
  flex-wrap: wrap;
  z-index: 6;
}
dial label, dialvol label {
  width: 50%;
  height: 50%;
  position: relative;
}
dialvol { width: 6em; top: 0; }

.vol u u, .tuning u u { transform: rotate(1deg); }
.vol u u, .vol u u:before,
.tuning u u, .tuning u u:before {
  transition: all 0.5s ease-in-out;
}

body:has(dialvol label:nth-of-type(1):hover) .vol u:before,
body:has(dialvol label:nth-of-type(2):hover) .vol u:before,
body:has(dialvol label:nth-of-type(3):hover) .vol u:before,
body:has(dialvol label:nth-of-type(4):hover) .vol u:before {
  filter: brightness(1.2) contrast(1.2);
}

body:has(#vol1:checked) .vol u u,
body:has(dialvol label:nth-of-type(1):hover) .vol u u {
  transform: rotate(315deg);
}
body:has(#vol1:checked) .vol u u:before,
body:has(dialvol label:nth-of-type(1):hover) .vol u u:before {
  transform: rotate(-315deg);
}
body:has(#vol1:checked) effects,
body:has(dialvol label:nth-of-type(1):hover) effects { filter: contrast(2); }

body:has(#vol2:checked) .vol u u,
body:has(dialvol label:nth-of-type(2):hover) .vol u u {
  transform: rotate(45deg);
}
body:has(#vol2:checked) .vol u u:before,
body:has(dialvol label:nth-of-type(2):hover) .vol u u:before {
  transform: rotate(-50deg);
}
body:has(#vol2:checked) effects,
body:has(dialvol label:nth-of-type(2):hover) effects { filter: contrast(0.5); }

body:has(#vol4:checked) .vol u u,
body:has(dialvol label:nth-of-type(4):hover) .vol u u {
  transform: rotate(135deg);
}
body:has(#vol4:checked) .vol u u:before,
body:has(dialvol label:nth-of-type(4):hover) .vol u u:before {
  transform: rotate(-140deg);
}
body:has(#vol4:checked) effects,
body:has(dialvol label:nth-of-type(4):hover) effects { filter: brightness(2); }

body:has(#vol3:checked) .vol u u,
body:has(dialvol label:nth-of-type(3):hover) .vol u u {
  transform: rotate(225deg);
}
body:has(#vol3:checked) .vol u u:before,
body:has(dialvol label:nth-of-type(3):hover) .vol u u:before {
  transform: rotate(-220deg);
}
body:has(#vol3:checked) effects,
body:has(dialvol label:nth-of-type(3):hover) effects {
  filter: contrast(0.2) brightness(2);
}

body:has(dial label:nth-of-type(1):hover) .tuning u:before,
body:has(dial label:nth-of-type(2):hover) .tuning u:before,
body:has(dial label:nth-of-type(3):hover) .tuning u:before,
body:has(dial label:nth-of-type(4):hover) .tuning u:before {
  filter: brightness(1.2) contrast(1.2);
}

tune {
  width: calc(100% - 26rem);
  height: calc(100% - 21rem);
  display: none;
  opacity: 0;
}
body:has(#on-off:checked) tune { opacity: 1; }

@keyframes channel {
  50% { background: var(--body); mix-blend-mode: unset; }
  70% { background: linear-gradient(magenta, cyan); filter: blur(1rem); mix-blend-mode: screen; }
}

body:has(#tune1:checked) .tuning u u,
body:has(dial label:nth-of-type(1):hover) .tuning u u { transform: rotate(315deg); }
body:has(#tune1:checked) .tuning u u:before,
body:has(dial label:nth-of-type(1):hover) .tuning u u:before { transform: rotate(-310deg); }
body:has(#tune1:checked) tune,
body:has(dial label:nth-of-type(1):hover) tune {
  animation: channel 0.2s forwards;
  display: block;
}
body:has(#tune1:checked) crt div > div,
body:has(dial label:nth-of-type(1):hover) crt div > div { filter: contrast(10); }
body:has(#tune1:checked) angle,
body:has(dial label:nth-of-type(1):hover) angle {
  transform: translate3d(-3rem, -4rem, 10rem) rotateX(-30deg);
  animation: wobble-hard 0.03s steps(2) infinite;
}
body:has(#tune1:checked) crt test,
body:has(dial label:nth-of-type(1):hover) crt test {
  opacity: 0.25;
  transform: translate3d(0, 0, 0);
}

@keyframes wobble-hard {
  100% { transform: translate3d(3rem, -3.5rem, 10rem) rotateX(-30deg); }
}

body:has(#tune2:checked) .tuning u u,
body:has(dial label:nth-of-type(2):hover) .tuning u u { transform: rotate(45deg); }
body:has(#tune2:checked) .tuning u u:before,
body:has(dial label:nth-of-type(2):hover) .tuning u u:before { transform: rotate(-50deg); }
body:has(#tune2:checked) tune,
body:has(dial label:nth-of-type(2):hover) tune {
  animation: channel 0.2s forwards;
  display: block;
}
body:has(#tune2:checked) effects:before,
body:has(dial label:nth-of-type(2):hover) effects:before { filter: contrast(2); }
body:has(#tune2:checked) crt test,
body:has(dial label:nth-of-type(2):hover) crt test { opacity: 0.5; }

body:has(#tune4:checked) .tuning u u,
body:has(dial label:nth-of-type(4):hover) .tuning u u { transform: rotate(135deg); }
body:has(#tune4:checked) .tuning u u:before,
body:has(dial label:nth-of-type(4):hover) .tuning u u:before { transform: rotate(-140deg); }
body:has(#tune4:checked) tune,
body:has(dial label:nth-of-type(4):hover) tune {
  animation: channel 0.2s forwards;
  display: block;
}
body:has(#tune4:checked) effects,
body:has(dial label:nth-of-type(4):hover) effects { opacity: 1; }
body:has(#tune4:checked) effects u,
body:has(dial label:nth-of-type(4):hover) effects u {
  animation: change 5s forwards;
  opacity: 1;
}
body:has(#tune4:checked) crt div > div,
body:has(dial label:nth-of-type(4):hover) crt div > div {
  animation: tuning 0.1s ease-in-out infinite !important;
  filter: contrast(2);
}

@keyframes tuning {
  0% { transform: translate3d(-10rem, -30rem, 0); }
  100% { transform: translate3d(10rem, 30rem, 0); }
}

@media (orientation: portrait) {
  panel { font-size: 2rem; }
  grill { flex-grow: 3; }
}
@media (orientation: landscape) {
  grill > u:nth-of-type(n + 23) { display: none; }
}

@keyframes rotatez2 {
  0% { transform: rotateZ(90deg); }
  50% { transform: rotateX(205deg) scale(2); }
  100% { transform: rotateZ(450deg); }
}

@keyframes rotatex {
  50% { transform: rotateX(180deg) scale(2); }
  100% { transform: rotateX(360deg); }
}

body:has(#unclick:not(:checked)) [for="unclick"] { z-index: 7; }

body:has(#tune3:checked) .tuning u u,
body:has(dial label:nth-of-type(3):hover) .tuning u u { transform: rotate(225deg); }
body:has(#tune3:checked) .tuning u u:before,
body:has(dial label:nth-of-type(3):hover) .tuning u u:before { transform: rotate(-220deg); }
body:has(#tune3:checked) crt test,
body:has(dial label:nth-of-type(3):hover) crt test { opacity: 1; }

crt test {
  opacity: 0;
  width: 100%;
  height: 100%;
  transform: translateZ(-50rem) scaleX(1.08) scaleY(1.14);
}
crt test u { width: 100%; height: 100%; }
crt test u u {
  position: relative;
  display: block;
  margin-block-end: 2.3rem;
}
crt test u u,
crt test u u:before,
crt test u u:after {
  background: linear-gradient(to right,
    #b8adc7 0% 14%, #c4b61a 14% 28%, #00bde5 28% 42%,
    #00cd00 42% 56%, #e200f7 56% 70%, #f20000 70% 85%,
    #0000ff 85% 100%);
  height: 1rem;
  width: 100%;
}
crt test u u:before { top: 1.1rem; animation: scanning 0.1s infinite linear; }
crt test u u:after { top: 2.2rem; animation: scanning 0.2s -0.1s infinite; }
crt test u u:nth-of-type(even) { animation: scanning 0.1s infinite linear; }
crt test u u:nth-of-type(odd)  { animation: scanning 0.3s infinite linear; }
crt test u u:nth-of-type(11),
